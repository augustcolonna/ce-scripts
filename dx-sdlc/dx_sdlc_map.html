<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DX SDLC Coverage Map</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f8fafc;--card:#fff;--border:#e2e8f0;
  --text:#1e293b;--text2:#64748b;--text3:#94a3b8;
  --report:#059669;--report-bg:#ecfdf5;--report-border:#a7f3d0;
  --driver:#7c3aed;--driver-bg:#f5f3ff;--driver-border:#c4b5fd;
  --workflow:#0891b2;--workflow-bg:#ecfeff;--workflow-border:#a5f3fc;
  --connector:#2563eb;--connector-bg:#eff6ff;--connector-border:#93c5fd;
  --noconn:#ea580c;--noconn-bg:#fff7ed;--noconn-border:#fed7aa;
  --dora:#0d9488;--dora-bg:#f0fdfa;
  --core4:#d97706;--core4-bg:#fffbeb;
  --lifecycle:#6366f1;--lifecycle-bg:#eef2ff;
  --radius:6px;--shadow:0 1px 3px rgba(0,0,0,.08);
}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);line-height:1.5;min-height:100vh}

/* Header */
.header{background:#fff;border-bottom:1px solid var(--border);padding:16px 24px;position:sticky;top:0;z-index:100;box-shadow:var(--shadow)}
.header-inner{max-width:1600px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
.header h1{font-size:20px;font-weight:700;color:var(--text)}
.header .subtitle{font-size:13px;color:var(--text2);margin-top:2px}
.controls{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.search-box{padding:6px 12px;border:1px solid var(--border);border-radius:var(--radius);font-size:13px;width:200px;font-family:inherit}
.search-box:focus{outline:none;border-color:var(--connector)}
.toggle-btn{padding:5px 12px;border:1px solid var(--border);border-radius:var(--radius);font-size:12px;font-weight:500;cursor:pointer;background:#fff;transition:all .15s;font-family:inherit}
.toggle-btn.active{color:#fff}
.toggle-btn[data-layer="reports"].active{background:var(--report);border-color:var(--report)}
.toggle-btn[data-layer="drivers"].active{background:var(--driver);border-color:var(--driver)}
.toggle-btn[data-layer="workflows"].active{background:var(--workflow);border-color:var(--workflow)}
.toggle-btn[data-layer="connectors"].active{background:var(--connector);border-color:var(--connector)}
.toggle-btn[data-layer="common"].active{background:var(--noconn);border-color:var(--noconn)}

/* Main container */
.main{max-width:1600px;margin:0 auto;padding:20px 24px}

/* Stage column labels at the top */
.stage-columns-header{display:grid;grid-template-columns:repeat(6,1fr);gap:4px;margin-bottom:6px;position:relative}
.stage-col-label{text-align:center;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--text);padding:8px 4px 6px;border-bottom:2px solid var(--text);background:var(--bg)}
.stage-col-label .col-sub{font-size:10px;font-weight:400;color:var(--text2);text-transform:none;letter-spacing:0;margin-top:2px;line-height:1.3}

/* Overlay bars */
.overlay-section{margin-bottom:24px}
.overlay-row-label{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin:12px 0 6px}
.overlay-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:4px;margin-bottom:4px}
.overlay-bar{padding:8px 12px;border-radius:var(--radius);font-size:12px;font-weight:600;cursor:pointer;text-decoration:none;color:#fff;transition:opacity .15s;display:flex;align-items:center;min-height:36px;position:relative;z-index:1}
.overlay-bar:hover{opacity:.85;z-index:50}
.overlay-bar.dora{background:var(--dora)}
.overlay-bar.core4{background:var(--core4)}
.overlay-bar.lifecycle{background:var(--lifecycle)}

/* Stage columns */
.stages-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:16px;margin-bottom:24px}
.stage-card{background:var(--card);border:1px solid var(--border);border-radius:8px;box-shadow:var(--shadow)}
.stage-header{padding:12px 14px;border-bottom:1px solid var(--border)}
.stage-header .stage-name{font-weight:700;font-size:14px;display:flex;align-items:center;gap:8px}
.stage-header .icon{font-size:18px}
.stage-header .stage-desc{font-size:11px;color:var(--text2);margin-top:4px;line-height:1.4}
.stage-header .stage-terms{font-size:10px;color:var(--text3);margin-top:4px;line-height:1.3}
.stage-header .stage-terms b{color:var(--text2);font-weight:600}
.stage-body{padding:10px}
.stage-section{margin-bottom:8px}
.stage-section:last-child{margin-bottom:4px}

/* Collapsible section titles */
.section-title{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-bottom:0;display:flex;align-items:center;gap:4px;cursor:pointer;padding:4px 0;user-select:none;transition:color .15s}
.section-title:hover{filter:brightness(1.3)}
.section-title .chevron{font-size:8px;transition:transform .2s;display:inline-block;width:12px}
.section-title .chevron.collapsed{transform:rotate(-90deg)}
.section-title.reports-title{color:var(--report)}
.section-title.drivers-title{color:var(--driver)}
.section-title.workflows-title{color:var(--workflow)}
.section-content{overflow:hidden;transition:max-height .25s ease, opacity .2s ease;max-height:2000px;opacity:1}
.section-content.collapsed{max-height:0;opacity:0}

/* Pills */
.pill{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:4px;font-size:11px;font-weight:500;margin:2px;cursor:pointer;text-decoration:none;transition:all .15s;position:relative;line-height:1.3;z-index:1}
.pill:hover{transform:translateY(-1px);box-shadow:0 2px 6px rgba(0,0,0,.12);z-index:50}
.pill.report{background:var(--report-bg);color:var(--report);border:1px solid var(--report-border)}
.pill.driver{background:var(--driver-bg);color:var(--driver);border:1px solid var(--driver-border)}
.pill.workflow{background:var(--workflow-bg);color:var(--workflow);border:1px solid var(--workflow-border)}
.pill .docs-link{font-size:9px;opacity:.4;margin-left:2px;text-decoration:none;color:inherit;border-left:1px solid currentColor;padding-left:4px}
.pill .docs-link:hover{opacity:1}
.pill .sr-badge{font-size:9px;opacity:.6;font-style:italic}

/* Tooltips - use JS-positioned div for reliable rendering */
#tooltip{position:fixed;background:#1e293b;color:#fff;padding:10px 14px;border-radius:8px;font-size:11px;font-weight:400;white-space:normal;width:280px;z-index:99999;pointer-events:none;line-height:1.45;box-shadow:0 8px 24px rgba(0,0,0,.25);display:none;max-width:calc(100vw - 32px)}
#tooltip.visible{display:block}
#tooltip::after{content:'';position:absolute;left:50%;transform:translateX(-50%);border:5px solid transparent}
#tooltip.above::after{top:100%;border-top-color:#1e293b}
#tooltip.below::after{bottom:100%;border-bottom-color:#1e293b}

/* Connector/Common tools grid */
.bottom-section{margin-top:32px}
.bottom-section h2{font-size:16px;font-weight:700;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.bottom-section h2 .count{font-size:13px;font-weight:500;color:var(--text2)}
.category-group{margin-bottom:20px}
.category-title{font-size:12px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;padding-bottom:4px;border-bottom:1px solid var(--border)}
.connectors-flex{display:flex;flex-wrap:wrap;gap:6px}
.conn-card{padding:6px 12px;border-radius:var(--radius);font-size:12px;font-weight:500;cursor:pointer;text-decoration:none;transition:all .15s;display:inline-flex;align-items:center;gap:6px;position:relative;z-index:1}
.conn-card:hover{transform:translateY(-1px);box-shadow:0 2px 6px rgba(0,0,0,.12);z-index:50}
.conn-card.dx{background:var(--connector-bg);color:var(--connector);border:1px solid var(--connector-border)}
.conn-card.nodx{background:var(--noconn-bg);color:var(--noconn);border:1px solid var(--noconn-border)}
.conn-card .stages-badge{font-size:9px;opacity:.6;font-weight:400}

/* Cross-cutting card */
.cross-card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:14px;margin-bottom:16px;box-shadow:var(--shadow)}

/* Feedback loop arrow */
.feedback-arrow{text-align:center;margin:-4px 0 12px;color:var(--text3);font-size:12px;font-weight:500}

/* Hidden state */
.layer-hidden{display:none!important}

/* Print */
@media print{
  .header{position:static}
  .controls{display:none}
  body{background:#fff}
  .section-content.collapsed{max-height:none;opacity:1}
}
@media(max-width:1200px){
  .stages-grid,.overlay-grid,.stage-columns-header{grid-template-columns:repeat(3,1fr)}
}
@media(max-width:768px){
  .stages-grid,.overlay-grid,.stage-columns-header{grid-template-columns:1fr}
}
</style>
</head>
<body>

<div class="header">
  <div class="header-inner">
    <div>
      <h1>DX SDLC Coverage Map</h1>
      <div class="subtitle">Interactive reference for SE enablement &mdash; click reports to open in app, hover for descriptions</div>
    </div>
    <div class="controls">
      <input type="text" class="search-box" placeholder="Search reports, tools..." id="searchBox">
      <button class="toggle-btn active" data-layer="reports" onclick="toggleLayer('reports')">Reports</button>
      <button class="toggle-btn active" data-layer="drivers" onclick="toggleLayer('drivers')">Drivers</button>
      <button class="toggle-btn active" data-layer="workflows" onclick="toggleLayer('workflows')">Workflows</button>
      <button class="toggle-btn active" data-layer="connectors" onclick="toggleLayer('connectors')">Connectors</button>
      <button class="toggle-btn active" data-layer="common" onclick="toggleLayer('common')">Common Tools</button>
    </div>
  </div>
</div>

<div class="main">
  <div id="overlays"></div>
  <div class="feedback-arrow">&#x21A9; Operations feeds back into Planning (incidents inform the next cycle)</div>
  <div id="stages"></div>
  <div id="bottomSection"></div>
</div>

<div id="tooltip"></div>

/* ── Tooltip via JS (fixed positioning, never clipped) ── */
const tip = document.getElementById('tooltip');
function showTip(e) {
  const text = e.currentTarget.dataset.tip;
  if (!text) return;
  tip.textContent = text;
  tip.className = 'visible';
  const r = e.currentTarget.getBoundingClientRect();
  const tw = 280;
  let left = r.left + r.width/2 - tw/2;
  left = Math.max(8, Math.min(left, window.innerWidth - tw - 8));
  if (r.top > 200) {
    tip.style.top = (r.top - tip.offsetHeight - 8) + 'px';
    tip.className = 'visible above';
  } else {
    tip.style.top = (r.bottom + 8) + 'px';
    tip.className = 'visible below';
  }
  tip.style.left = left + 'px';
}
function hideTip() { tip.className = ''; }

function bindTips(root) {
  root.querySelectorAll('[data-tip]').forEach(el => {
    el.addEventListener('mouseenter', showTip);
    el.addEventListener('mouseleave', hideTip);
  });
}

/* ── Render ── */

  renderOverlays();
  renderStages();
  renderBottom();
  bindTips(document.body);
}

function renderOverlays() {
  const el = document.getElementById('overlays');
  let html = '';

  // Stage column labels
  html += '<div class="stage-columns-header">';
  DATA.stages.forEach(s => {
    html += `<div class="stage-col-label">${s.icon} ${s.name}<div class="col-sub">${s.desc}</div></div>`;
  });
  html += '</div>';

  // DORA
  html += '<div class="overlay-row-label">DORA Metrics</div><div class="overlay-grid">';
  DATA.dora.forEach(d => {
    const span = `grid-column:${d.cols[0]}/${d.cols[1]+1}`;
    html += `<a href="${d.url}" target="_blank" class="overlay-bar dora" style="${span}" data-tip="${esc(d.desc)}">${d.name}</a>`;
  });
  html += '</div>';

  // Core 4
  html += '<div class="overlay-row-label">DX Core 4</div><div class="overlay-grid">';
  DATA.core4.forEach(d => {
    const span = `grid-column:${d.cols[0]}/${d.cols[1]+1}`;
    html += `<a href="${d.url}" target="_blank" class="overlay-bar core4" style="${span}" data-tip="${esc(d.desc)}">${d.name}</a>`;
  });
  html += '</div>';

  // Lifecycle by Phase
  html += '<div class="overlay-row-label">Lifecycle by Phase</div><div class="overlay-grid">';
  DATA.lifecycle.forEach(d => {
    const span = `grid-column:${d.cols[0]}/${d.cols[1]+1}`;
    html += `<a href="${d.url}" target="_blank" class="overlay-bar lifecycle" style="${span}" data-tip="${esc(d.desc)}">${d.name}</a>`;
  });
  html += '</div>';

  el.innerHTML = html;
}

function renderStages() {
  const el = document.getElementById('stages');
  let html = '<div class="stages-grid">';

  DATA.stages.forEach(stage => {
    const reports = DATA.reports.filter(r => r.stages.includes(stage.id) && r.stages.length <= 2);
    const drivers = DATA.drivers.filter(d => d.stages.includes(stage.id) && d.stages.length <= 2);
    const workflows = DATA.workflows.filter(w => w.stages.includes(stage.id) && w.stages.length <= 2);

    html += `<div class="stage-card">`;
    html += `<div class="stage-header">`;
    html += `<div class="stage-name"><span class="icon">${stage.icon}</span>${stage.name}</div>`;
    html += `<div class="stage-desc">${stage.desc}</div>`;
    html += `<div class="stage-terms"><b>Tools:</b> ${stage.terms}</div>`;
    html += `<div class="stage-terms"><b>Concepts:</b> ${stage.concepts}</div>`;
    html += `</div>`;
    html += `<div class="stage-body">`;

    // Reports (collapsible)
    html += `<div class="stage-section layer-reports">`;
    html += `<div class="section-title reports-title" onclick="toggleSection(this)"><span class="chevron">\u25BC</span> Reports (${reports.length})</div>`;
    html += `<div class="section-content">`;
    reports.forEach(r => {
      const appUrl = `${APP}/report/${r.route}`;
      const docsUrl = r.docsUrl || `${DOCS}/reports/${r.route}/`;
      const sr = r.sr ? ' <span class="sr-badge">(SR)</span>' : '';
      html += `<a href="${appUrl}" target="_blank" class="pill report searchable" data-tip="${esc(r.desc)}" data-name="${esc(r.name)}">${r.name}${sr}<span class="docs-link" onclick="event.preventDefault();event.stopPropagation();window.open('${docsUrl}','_blank')" title="Open docs">docs</span></a>`;
    });
    html += '</div></div>';

    // Drivers (collapsible)
    html += `<div class="stage-section layer-drivers">`;
    html += `<div class="section-title drivers-title" onclick="toggleSection(this)"><span class="chevron">\u25BC</span> Drivers (${drivers.length})</div>`;
    html += `<div class="section-content">`;
    drivers.forEach(d => {
      const label = d.cultural ? ' [cultural]' : '';
      html += `<a href="${DOCS}/snapshots/pre-snapshot/" target="_blank" class="pill driver searchable" data-tip="${esc(d.prompt + label)}" data-name="${esc(d.name)}">${d.name}</a>`;
    });
    html += '</div></div>';

    // Workflows (collapsible)
    html += `<div class="stage-section layer-workflows">`;
    html += `<div class="section-title workflows-title" onclick="toggleSection(this)"><span class="chevron">\u25BC</span> Workflows (${workflows.length})</div>`;
    html += `<div class="section-content">`;
    workflows.forEach(w => {
      html += `<a href="${DOCS}/snapshots/pre-snapshot/" target="_blank" class="pill workflow searchable" data-tip="${esc(w.desc)}" data-name="${esc(w.name)}">${w.name}</a>`;
    });
    html += '</div></div>';

    html += '</div></div>';
  });

  html += '</div>';

  // Cross-cutting reports
  const crossReports = DATA.reports.filter(r => r.stages.length > 2);
  if (crossReports.length) {
    html += '<div class="cross-card layer-reports">';
    html += '<div class="section-title reports-title" onclick="toggleSection(this)"><span class="chevron">\u25BC</span> Cross-cutting reports (' + crossReports.length + ')</div>';
    html += '<div class="section-content">';
    crossReports.forEach(r => {
      const appUrl = `${APP}/report/${r.route}`;
      const docsUrl = r.docsUrl || `${DOCS}/reports/${r.route}/`;
      const sr = r.sr ? ' <span class="sr-badge">(SR)</span>' : '';
      html += `<a href="${appUrl}" target="_blank" class="pill report searchable" data-tip="${esc(r.desc)}" data-name="${esc(r.name)}">${r.name}${sr}<span class="docs-link" onclick="event.preventDefault();event.stopPropagation();window.open('${docsUrl}','_blank')" title="Open docs">docs</span></a>`;
    });
    html += '</div></div>';
  }

  // Cross-cutting drivers
  const crossDrivers = DATA.drivers.filter(d => d.stages.length > 2);
  if (crossDrivers.length) {
    html += '<div class="cross-card layer-drivers">';
    html += '<div class="section-title drivers-title" onclick="toggleSection(this)"><span class="chevron">\u25BC</span> Cross-cutting drivers (' + crossDrivers.length + ')</div>';
    html += '<div class="section-content">';
    crossDrivers.forEach(d => {
      const label = d.cultural ? ' [cultural]' : '';
      html += `<a href="${DOCS}/snapshots/pre-snapshot/" target="_blank" class="pill driver searchable" data-tip="${esc(d.prompt + label)}" data-name="${esc(d.name)}">${d.name}</a>`;
    });
    html += '</div></div>';
  }

  // Cross-cutting workflows
  const crossWorkflows = DATA.workflows.filter(w => w.stages.length > 2);
  if (crossWorkflows.length) {
    html += '<div class="cross-card layer-workflows">';
    html += '<div class="section-title workflows-title" onclick="toggleSection(this)"><span class="chevron">\u25BC</span> Cross-cutting workflows (' + crossWorkflows.length + ')</div>';
    html += '<div class="section-content">';
    crossWorkflows.forEach(w => {
      html += `<a href="${DOCS}/snapshots/pre-snapshot/" target="_blank" class="pill workflow searchable" data-tip="${esc(w.desc)}" data-name="${esc(w.name)}">${w.name}</a>`;
    });
    html += '</div></div>';
  }

  el.innerHTML = html;
}

function renderBottom() {
  const el = document.getElementById('bottomSection');
  let html = '';

  const cats = [...new Set(DATA.connectors.map(c => c.cat))];
  html += '<div class="bottom-section layer-connectors"><h2>DX Connectors <span class="count">(' + DATA.connectors.length + ' integrations)</span></h2>';
  cats.forEach(cat => {
    const items = DATA.connectors.filter(c => c.cat === cat);
    html += `<div class="category-group"><div class="category-title">${cat}</div><div class="connectors-flex">`;
    items.forEach(c => {
      const badges = c.stages.map(s => DATA.stages.find(st => st.id === s)?.name).filter(Boolean).join(', ');
      html += `<a href="${c.url}" target="_blank" class="conn-card dx searchable" data-tip="${esc(c.desc)}" data-name="${esc(c.name)}">${c.name} <span class="stages-badge">${badges}</span></a>`;
    });
    html += '</div></div>';
  });
  html += '</div>';

  const commonCats = [...new Set(DATA.commonTools.map(c => c.cat))];
  html += '<div class="bottom-section layer-common"><h2>Common Tools Without DX Connector <span class="count">(' + DATA.commonTools.length + ' tools)</span></h2>';
  commonCats.forEach(cat => {
    const items = DATA.commonTools.filter(c => c.cat === cat);
    html += `<div class="category-group"><div class="category-title">${cat}</div><div class="connectors-flex">`;
    items.forEach(c => {
      html += `<span class="conn-card nodx searchable" data-tip="${esc(c.desc)}" data-name="${esc(c.name)}">${c.name}</span>`;
    });
    html += '</div></div>';
  });
  html += '</div>';

  el.innerHTML = html;
}

/* ── Interactivity ── */
const layerState = {reports:true,drivers:true,workflows:true,connectors:true,common:true};

function toggleLayer(layer) {
  layerState[layer] = !layerState[layer];
  const btn = document.querySelector(`.toggle-btn[data-layer="${layer}"]`);
  btn.classList.toggle('active', layerState[layer]);
  document.querySelectorAll(`.layer-${layer}`).forEach(el => {
    el.classList.toggle('layer-hidden', !layerState[layer]);
  });
}

function toggleSection(titleEl) {
  const chevron = titleEl.querySelector('.chevron');
  const content = titleEl.nextElementSibling;
  chevron.classList.toggle('collapsed');
  content.classList.toggle('collapsed');
}

document.getElementById('searchBox').addEventListener('input', function() {
  const q = this.value.toLowerCase().trim();
  document.querySelectorAll('.searchable').forEach(el => {
    if (!q) { el.style.display = ''; return; }
    const name = (el.dataset.name || el.textContent).toLowerCase();
    const tooltip = (el.dataset.tip || '').toLowerCase();
    el.style.display = (name.includes(q) || tooltip.includes(q)) ? '' : 'none';
  });
});

function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

render();
</script>
